  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ANCIENT SECURED VAULT">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ANCIENT SECURED VAULT</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html.ancient-vault-ios input,
    html.ancient-vault-ios textarea,
    html.ancient-vault-ios flt-text-editing-host input,
    html.ancient-vault-ios flt-text-editing-host textarea {
      color: #ffffff !important;
      -webkit-text-fill-color: #ffffff !important;
      caret-color: #63f5a5 !important;
      opacity: 1 !important;
    }
  </style>
  <script>
    if ((navigator.userAgent || '').toLowerCase().includes('ancientsecurevaultiosapp')) {
      document.documentElement.classList.add('ancient-vault-ios');
    }

    (function installMobileVaultNarrationBridge() {
      const userAgent = (navigator.userAgent || '').toLowerCase();
      const isMobileVaultApp =
        userAgent.includes('ancientsecurevaultandroidapp') ||
        userAgent.includes('ancientsecurevaultiosapp');
      if (!isMobileVaultApp) return;
      if (window.__ancientVaultTtsBridgeInstalled) return;

      window.__ancientVaultTtsBridgeInstalled = true;
      let utteranceId = 0;
      const voiceDefinitions = [
        ['ANCIENT SECURED VAULT Human Reader', 'en-US', 'ancient-vault-human-reader-en', true],
        ['Google US English Female', 'en-US', 'google-us-english-female', false],
        ['Google US English Male', 'en-US', 'google-us-english-male', false],
        ['Google UK English Female', 'en-GB', 'google-uk-english-female', false],
        ['Google UK English Male', 'en-GB', 'google-uk-english-male', false],
        ['Google English Natural Reader', 'en-US', 'google-english-natural-reader', false],
        ['Google English Studio Reader', 'en-US', 'google-english-studio-reader', false],
        ['Human Narrator - Calm English', 'en-US', 'human-calm-english', false],
        ['Human Narrator - Deep English', 'en-US', 'human-deep-english', false],
        ['African English Reader', 'en-US', 'african-english-reader', false],
        ['Google French Female', 'fr-FR', 'google-french-female', false],
        ['Human Narrator - French', 'fr-FR', 'human-french-reader', false],
      ];
      const voices = voiceDefinitions.map(([name, lang, voiceURI, isDefault]) => ({
        name,
        lang,
        voiceURI,
        localService: true,
        default: Boolean(isDefault),
      }));
      const state = {
        current: null,
        speaking: false,
        paused: false,
      };

      function VaultSpeechSynthesisUtterance(text) {
        this.text = text || '';
        this.lang = 'en-US';
        this.pitch = 1;
        this.rate = 1;
        this.volume = 1;
        this.voice = null;
        this.onstart = null;
        this.onend = null;
        this.onpause = null;
        this.onresume = null;
        this.onerror = null;
        this.onboundary = null;
      }

      function send(message) {
        if (!window.AncientVaultTts || !window.AncientVaultTts.postMessage) {
          setTimeout(() => {
            const current = state.current;
            if (current && typeof current.onerror === 'function') {
              current.onerror({ error: 'native-tts-bridge-unavailable' });
            }
          }, 0);
          return;
        }

        window.AncientVaultTts.postMessage(JSON.stringify(message));
      }

      window.__ancientVaultTtsEvent = function receiveNativeTtsEvent(event) {
        const current = state.current;
        if (!current || !event || event.id !== current.__ancientVaultId) return;

        switch (event.type) {
          case 'start':
            state.speaking = true;
            state.paused = false;
            if (typeof current.onstart === 'function') current.onstart({});
            break;
          case 'end':
            state.speaking = false;
            state.paused = false;
            if (typeof current.onend === 'function') current.onend({});
            break;
          case 'pause':
            state.paused = true;
            if (typeof current.onpause === 'function') current.onpause({});
            break;
          case 'resume':
            state.paused = false;
            if (typeof current.onresume === 'function') current.onresume({});
            break;
          case 'cancel':
            state.speaking = false;
            state.paused = false;
            break;
          case 'boundary':
            if (typeof current.onboundary === 'function') {
              current.onboundary({
                charIndex: event.start || 0,
                charLength: Math.max(0, (event.end || 0) - (event.start || 0)),
                name: 'word',
              });
            }
            break;
          case 'error':
            state.speaking = false;
            state.paused = false;
            if (typeof current.onerror === 'function') {
              current.onerror({ error: event.error || 'native-tts-error' });
            }
            break;
        }
      };

      const nativeSpeechSynthesis = {
        get speaking() {
          return state.speaking;
        },
        get paused() {
          return state.paused;
        },
        get pending() {
          return false;
        },
        getVoices() {
          return voices;
        },
        speak(utterance) {
          if (!utterance) return;
          const id = `vault-tts-${++utteranceId}`;
          utterance.__ancientVaultId = id;
          state.current = utterance;
          state.speaking = true;
          state.paused = false;
          send({
            action: 'speak',
            id,
            text: utterance.text || '',
            lang: (utterance.voice && utterance.voice.lang) || utterance.lang || 'en-US',
            voiceName: utterance.voice && utterance.voice.name,
            voiceURI: utterance.voice && utterance.voice.voiceURI,
            rate: utterance.rate || 1,
            pitch: utterance.pitch || 1,
            volume: utterance.volume || 1,
          });
        },
        cancel() {
          state.speaking = false;
          state.paused = false;
          send({ action: 'cancel', id: state.current && state.current.__ancientVaultId });
        },
        pause() {
          state.paused = true;
          send({ action: 'pause', id: state.current && state.current.__ancientVaultId });
        },
        resume() {
          state.paused = false;
          send({ action: 'resume', id: state.current && state.current.__ancientVaultId });
        },
        addEventListener() {},
        removeEventListener() {},
      };

      try {
        Object.defineProperty(window, 'speechSynthesis', {
          value: nativeSpeechSynthesis,
          configurable: true,
        });
        Object.defineProperty(window, 'SpeechSynthesisUtterance', {
          value: VaultSpeechSynthesisUtterance,
          configurable: true,
        });
      } catch (_) {
        window.speechSynthesis = nativeSpeechSynthesis;
        window.SpeechSynthesisUtterance = VaultSpeechSynthesisUtterance;
      }
    })();
  </script>
  <!--
    Load the protected reader before Flutter starts. WKWebView can serve this
    file successfully without delivering the dynamic script onLoad callback,
    which previously left iOS readers waiting indefinitely.
  -->
  <script src="pdfjs/pdf.min.js"></script>
  <script>
    window.__ancientVaultRenderPdfPage = function renderVaultPdfPage(
      page,
      canvasId,
      scale
    ) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) throw new Error(`Protected PDF canvas ${canvasId} was not found.`);

      const viewport = page.getViewport({ scale });
      const context = canvas.getContext('2d', { alpha: false });
      if (!context) throw new Error('The protected PDF canvas context is unavailable.');

      canvas.width = Math.ceil(viewport.width);
      canvas.height = Math.ceil(viewport.height);
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = 'high';

      return page.render({
        canvasContext: context,
        viewport,
      }).promise;
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    (async function resetOldVaultCache() {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
        }
      } catch (_) {
        // Cache cleanup must never block app startup.
      } finally {
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js?v=20260615-reader-cache-reset';
        script.async = true;
        document.body.appendChild(script);
      }
    })();
  </script>
</body>
